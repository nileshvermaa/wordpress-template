# Local WordPress for developing & testing the theme.
#
#   docker compose up -d
#   → open http://localhost:8080  (run the 2-minute WP install wizard)
#   → WP Admin → Appearance → Themes → activate "Lumen Wellness"
#
# The theme folder is mounted live, so any edit you make on disk shows up on
# refresh. Unlike the GitHub Pages snapshot, the contact form actually works
# here because this is real PHP + MySQL.
#
#   docker compose down        # stop (keeps data)
#   docker compose down -v      # stop and wipe the database

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      # Show PHP errors while developing.
      WORDPRESS_DEBUG: 1
    volumes:
      # Live-mount only the theme so your edits are reflected instantly.
      - ./lumen-wellness:/var/www/html/wp-content/themes/lumen-wellness
      # Persist the rest of the WP install (uploads, other plugins, db config).
      - wp_data:/var/www/html

volumes:
  db_data:
  wp_data:
