name: Lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  php-syntax:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint all PHP files (php -l)
        run: |
          set -e
          echo "Checking PHP syntax in lumen-wellness/ ..."
          find lumen-wellness -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l
          echo "All PHP files passed."
